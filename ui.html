<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
  <style>
    /* Мелкие стили для новых полей ввода тайминга */
    .timing-group { 
        display: flex; 
        justify-content: 
        space-between; 
        gap: 10px; 
        margin-bottom: 10px; 
    }
    .timing-box { flex: 1; }
    .timing-box input[type=number] { 
        width: 100%; 
        padding: 5px; 
        border: 1px solid #ddd; 
        border-radius: 4px; 
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>DualSub Pro</h2>
    <button id="openTabBtn" title="Открыть в новой вкладке">⧉</button>
  </div>
  
  <div class="card">
    <label>Верхние субтитры:</label>
    <select id="topSubs"><option value="none">-- Выключено --</option></select>
    <label>Нижние субтитры:</label>
    <select id="bottomSubs"><option value="none">-- Выключено --</option></select>
  </div>

  <div class="card settings-card">
    <label>Синхронизация (миллисекунды):</label>
    <div class="timing-group">
      <div class="timing-box">
        <label style="font-size: 11px;">Верхние (мс):</label>
        <input type="number" id="topDelay" step="100" value="0" placeholder="-500 или 1000">
      </div>
      <div class="timing-box">
        <label style="font-size: 11px;">Нижние (мс):</label>
        <input type="number" id="bottomDelay" step="100" value="0" placeholder="-500 или 1000">
      </div>
    </div>

    <label>Размер текста: <span id="sizeVal">24</span>px</label>
    <input type="range" id="fontSize" min="12" max="40" value="24">
    
    <label>Отступ сверху: <span id="topVal">5</span>%</label>
    <input type="range" id="topOffset" min="0" max="50" value="5">
    
    <label>Отступ снизу: <span id="botVal">10</span>%</label>
    <input type="range" id="bottomOffset" min="0" max="50" value="10">
  </div>

  <div class="card checkbox-card">
    <input type="checkbox" id="autoRemember" checked>
    <label for="autoRemember">Запомнить мой выбор</label>
  </div>

  <button id="applyBtn" class="primary-btn">Применить к плееру</button>

  <script src="ui.js"></script>
</body>
</html>
