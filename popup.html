<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    body { 
        width: 300px; 
        padding: 15px; 
        font-family: Arial; 
    }
    h3 { 
        margin-top: 0; 
        font-size: 16px; 
        margin-bottom: 10px; 
    }
    .select-block { 
        margin-bottom: 15px; 
    }
    select { 
        width: 100%; 
        padding: 5px; 
        margin-top: 5px; 
    }
    button { width: 100%; 
        padding: 10px; 
        cursor: pointer; 
        background: #4CAF50; 
        color: white; 
        border: none; 
        font-weight: bold; 
    }
    button:hover { 
        background: #45a049; 
    }
  </style>
</head>
<body>
  <h3>Настройка субтитров</h3>
  
  <div class="select-block">
    <label>Верхние субтитры:</label>
    <select id="topSubs"><option value="">-- Не выбрано --</option></select>
  </div>

  <div class="select-block">
    <label>Нижние субтитры:</label>
    <select id="bottomSubs"><option value="">-- Не выбрано --</option></select>
  </div>

  <button id="applyBtn">Применить и показать</button>

  <script src="popup.js"></script>
</body>
</html>
